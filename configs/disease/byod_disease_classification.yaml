study:
  name: "byod_disease_classification"
  output_root: "${EEB_OUTPUT_ROOT}/disease"

dataset:
  root: "${EEB_DATA_ROOT}/disease_byod/images"
  manifest_csv: "${EEB_DATA_ROOT}/disease_byod/manifest.csv"
  image_size: 224
  normalize_imagenet: true

models:
  - model_id: "vit_b16_lejepa"
    label: "External-Eye LeJEPA ViT-B/16"
    source: "checkpoint"
    run_name: "delta-lejepa-vit-b16"
    run_dir: "${EEB_CHECKPOINT_ROOT}/vit_b16/delta-lejepa-vit-b16"
    checkpoint_step: 0
  - model_id: "dinov2_vitb14"
    label: "DINOv2 ViT-B/14"
    source: "external"
    external_model: "dinov2_vitb14"
    checkpoint_step: 0

pooling: "g4"
embedding_key: "backbone/features"

extraction:
  batch_size: 128
  num_workers: 4
  device: "auto"
  precision: "fp32"
  overwrite: false

reduction:
  method: "pca"
  random_state: 0
  tsne_perplexity: 30.0

supervised:
  label_column: "label"
  group_column: "group_id"
  train_frac: 0.8
  seed: 0
  linear_epochs: 100
  linear_batch_size: 128
  linear_lr: 0.001
  finetune_epochs: 5
  finetune_batch_size: 32
  backbone_lr: 0.0001
  head_lr: 0.001
  weight_decay: 0.0001
