dataset:
  name: "periorbital_224_v2"
  root: "${EEB_OUTPUT_ROOT}/landmarks/periorbital_224_v2"

landmarks:
  keys:
    - "iris_centroid"
    - "iris_superior"
    - "iris_inferior"
    - "sclera_superior"
    - "sclera_inferior"
    - "medial_canthus"
    - "lateral_canthus"
    - "lid_superior"
    - "lid_inferior"

image:
  size: 224
  normalize_imagenet: true

subdatasets:
  - name: "celeb"
  - name: "cfd"

metadata:
  manifest_csv: "metadata/dataset_manifest.csv"
  landmarks_csv: "metadata/landmarks.csv"
  split_csv: "metadata/split_assignments.csv"
  failures_csv: "metadata/prep_failures.csv"
  summary_csv: "metadata/prep_summary.csv"

splits:
  seed: 0
  train_frac: 0.8
  val_frac: 0.1
  test_frac: 0.1

raw_sources:
  - name: "celeb"
    image_dir: "${EEB_DATA_ROOT}/landmark_raw/celeb/images"
    mask_dir: "${EEB_DATA_ROOT}/landmark_raw/celeb/masks"
    image_suffix: ".jpg"
    mask_suffix: ".png"
  - name: "cfd"
    image_dir: "${EEB_DATA_ROOT}/landmark_raw/cfd/images"
    mask_dir: "${EEB_DATA_ROOT}/landmark_raw/cfd/masks"
    image_suffix: ".jpg"
    mask_suffix: ".png"
