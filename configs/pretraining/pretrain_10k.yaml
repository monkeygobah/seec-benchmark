run:
  name: "pretrain-10k-example"
  runs_root: "${EEB_OUTPUT_ROOT}/runs"
  seed: 2026
  total_steps: 50000
  warmup_steps: 12500
  log_every: 100
  ckpt_every: 10000

runtime:
  distributed: "auto"
  ddp_backend: "nccl"
  gpu: 0

data:
  dataset: "pretrain_10k"
  train_root: "${EEB_DATA_ROOT}/subset6"
  train_manifest: "${EEB_RELEASE_ROOT}/manifests/pretrain/pretrain_10k.txt"
  image_size: 224

dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: true
  pin_memory: true
  drop_last: true

model:
  backbone: "resnet101"
  init: "imagenet"
  seg_ckpt: null
  feat_dim: 2048
  proj_dim: 128
  proj_hidden: 2048
  proj_layers: 3

ssl:
  method: "vicreg"
  aug_mode: "local_only"
  normalize_imagenet: true
  V: 2
  crop_size: 112
  crop_scale_min: 0.08
  crop_scale_max: 1.0

optim:
  lr: 0.0005
  weight_decay: 0.0005
  warmup_factor: 0.01

sched:
  final_lr: 0.0000005

amp:
  enabled: true
  dtype: "bf16"

vicreg:
  w_inv: 25.0
  w_var: 25.0
  w_cov: 1.0
  var_target: 1.0
  eps: 0.0001
  gather: true
